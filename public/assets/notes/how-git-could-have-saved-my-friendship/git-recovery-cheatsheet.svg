<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="1200"
  viewBox="0 0 960 1200" role="img" aria-labelledby="svg-title svg-desc">
  <title id="svg-title">Git recovery cheatsheet</title>
  <desc id="svg-desc">A one-page decision tree branches from what happened to deleted commit, old file, undo, and wrong commit, leading to reflog, checkout, restore, and reset.</desc>
  <metadata>How Git Could Have Saved My Friendship — figure 11</metadata>

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L8 5 L1 9" fill="none" stroke="#4C8BF5" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" />
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L8 5 L1 9" fill="none" stroke="#666666" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" />
    </marker>
    <style>
    :root { color-scheme: light; }
    * { vector-effect: non-scaling-stroke; }
    text {
      font-family: Inter, "SF Pro Text", "SF Pro Display", -apple-system,
        BlinkMacSystemFont, "Segoe UI", sans-serif;
      fill: #111111;
      text-rendering: geometricPrecision;
    }
    .mono {
      font-family: "JetBrains Mono", "IBM Plex Mono", "SFMono-Regular",
        Consolas, monospace;
    }
    .eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 1.6px; fill: #4C8BF5; }
    .title { font-size: 30px; font-weight: 650; letter-spacing: -0.6px; }
    .subtitle { font-size: 15px; font-weight: 450; fill: #666666; }
    .section { font-size: 16px; font-weight: 650; letter-spacing: -0.15px; }
    .label { font-size: 14px; font-weight: 650; }
    .body { font-size: 14px; font-weight: 450; }
    .small { font-size: 12px; font-weight: 500; fill: #666666; }
    .tiny { font-size: 11px; font-weight: 550; fill: #666666; letter-spacing: 0.2px; }
    .hash { font-size: 12px; font-weight: 550; fill: #666666; }
    .blue-text { fill: #4C8BF5; }
    .muted { fill: #B8B8B8; }
    .white-text { fill: #FFFFFF; }
    .panel { fill: #FFFFFF; stroke: #EDEDED; stroke-width: 2; }
    .object { fill: #FFFFFF; stroke: #B8B8B8; stroke-width: 2; }
    .object-dark { fill: #FFFFFF; stroke: #2F2F2F; stroke-width: 2; }
    .object-blue { fill: #FFFFFF; stroke: #4C8BF5; stroke-width: 2; }
    .soft-fill { fill: #EDEDED; }
    .blue-fill { fill: #4C8BF5; }
    .line { fill: none; stroke: #B8B8B8; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .line-dark { fill: none; stroke: #2F2F2F; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .line-blue { fill: none; stroke: #4C8BF5; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .rule { stroke: #EDEDED; stroke-width: 2; }
    .dash { stroke-dasharray: 8 8; }
    .dot { fill: #FFFFFF; stroke: #2F2F2F; stroke-width: 2; }
    .dot-blue { fill: #FFFFFF; stroke: #4C8BF5; stroke-width: 2; }
    .command-chip { fill: #4C8BF5; fill-opacity: 0.10; stroke: #4C8BF5; stroke-opacity: 0.34; stroke-width: 2; }
  </style>
  </defs>
  <rect id="canvas" width="960" height="1200" fill="#FFFFFF" />

  <g id="figure-header">
    <text class="eyebrow" x="64" y="48">GIT SYSTEM / 11</text>
    <text class="title" x="64" y="88">Git recovery cheatsheet</text>
    <text class="subtitle" x="64" y="116">Start from the failure mode, then choose the smallest mechanism that restores reachability or content.</text>
    <line class="rule" x1="64" y1="144" x2="896" y2="144" />
  </g>

  <g id="recovery-decision-tree">
    <g id="root-question">
      <rect class="object-dark" x="200" y="192" width="560" height="96" rx="8" />
      <text class="tiny" x="480" y="224" text-anchor="middle">START HERE</text>
      <text class="title" x="480" y="260" text-anchor="middle">What happened?</text>
    </g>

    <!-- Branching spine -->
    <g id="decision-branches">
      <path class="line" d="M480 288 L480 344 M240 344 L720 344 M240 344 L240 400 M720 344 L720 400" />
      <path class="line" d="M480 344 L480 680 M240 680 L720 680 M240 680 L240 736 M720 680 L720 736" />
    </g>

    <g id="deleted-commit-path">
      <rect class="panel" x="64" y="400" width="352" height="96" rx="8" />
      <text class="section" x="88" y="436">Deleted commit</text>
      <text class="small" x="88" y="464">Find where HEAD pointed before</text>
      <path class="line-blue" d="M240 496 L240 544" marker-end="url(#arrow-blue)" />
      <rect class="object-blue" x="64" y="552" width="352" height="80" rx="8" />
      <text class="tiny blue-text" x="88" y="580">USE</text>
      <text class="mono section blue-text" x="88" y="610">git reflog</text>
    </g>

    <g id="old-file-path">
      <rect class="panel" x="544" y="400" width="352" height="96" rx="8" />
      <text class="section" x="568" y="436">Need old file</text>
      <text class="small" x="568" y="464">Read one path from a snapshot</text>
      <path class="line-blue" d="M720 496 L720 544" marker-end="url(#arrow-blue)" />
      <rect class="object-blue" x="544" y="552" width="352" height="80" rx="8" />
      <text class="tiny blue-text" x="568" y="580">USE</text>
      <text class="mono section blue-text" x="568" y="610">git checkout</text>
    </g>

    <g id="undo-path">
      <rect class="panel" x="64" y="736" width="352" height="96" rx="8" />
      <text class="section" x="88" y="772">Need undo</text>
      <text class="small" x="88" y="800">Restore working-tree content</text>
      <path class="line-blue" d="M240 832 L240 880" marker-end="url(#arrow-blue)" />
      <rect class="object-blue" x="64" y="888" width="352" height="80" rx="8" />
      <text class="tiny blue-text" x="88" y="916">USE</text>
      <text class="mono section blue-text" x="88" y="946">git restore</text>
    </g>

    <g id="wrong-commit-path">
      <rect class="panel" x="544" y="736" width="352" height="96" rx="8" />
      <text class="section" x="568" y="772">Wrong commit</text>
      <text class="small" x="568" y="800">Move the current branch pointer</text>
      <path class="line-blue" d="M720 832 L720 880" marker-end="url(#arrow-blue)" />
      <rect class="object-blue" x="544" y="888" width="352" height="80" rx="8" />
      <text class="tiny blue-text" x="568" y="916">USE</text>
      <text class="mono section blue-text" x="568" y="946">git reset</text>
    </g>

    <g id="recovery-caution">
      <line class="rule" x1="160" y1="1040" x2="800" y2="1040" />
      <text class="body" x="480" y="1080" text-anchor="middle">Inspect first. Move the fewest references necessary.</text>
      <text class="tiny" x="480" y="1112" text-anchor="middle">STATUS · LOG · REFLOG</text>
    </g>
  </g>
</svg>
