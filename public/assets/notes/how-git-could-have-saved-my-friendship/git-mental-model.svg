<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900"
  viewBox="0 0 1200 900" role="img" aria-labelledby="svg-title svg-desc">
  <title id="svg-title">Git mental model</title>
  <desc id="svg-desc">An editorial conceptual sequence flows from history to branches to snapshots to references to recovery and finally confidence.</desc>
  <metadata>How Git Could Have Saved My Friendship — figure 12</metadata>

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L8 5 L1 9" fill="none" stroke="#4C8BF5" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" />
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L8 5 L1 9" fill="none" stroke="#666666" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" />
    </marker>
    <style>
    :root { color-scheme: light; }
    * { vector-effect: non-scaling-stroke; }
    text {
      font-family: Inter, "SF Pro Text", "SF Pro Display", -apple-system,
        BlinkMacSystemFont, "Segoe UI", sans-serif;
      fill: #111111;
      text-rendering: geometricPrecision;
    }
    .mono {
      font-family: "JetBrains Mono", "IBM Plex Mono", "SFMono-Regular",
        Consolas, monospace;
    }
    .eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 1.6px; fill: #4C8BF5; }
    .title { font-size: 30px; font-weight: 650; letter-spacing: -0.6px; }
    .subtitle { font-size: 15px; font-weight: 450; fill: #666666; }
    .section { font-size: 16px; font-weight: 650; letter-spacing: -0.15px; }
    .label { font-size: 14px; font-weight: 650; }
    .body { font-size: 14px; font-weight: 450; }
    .small { font-size: 12px; font-weight: 500; fill: #666666; }
    .tiny { font-size: 11px; font-weight: 550; fill: #666666; letter-spacing: 0.2px; }
    .hash { font-size: 12px; font-weight: 550; fill: #666666; }
    .blue-text { fill: #4C8BF5; }
    .muted { fill: #B8B8B8; }
    .white-text { fill: #FFFFFF; }
    .panel { fill: #FFFFFF; stroke: #EDEDED; stroke-width: 2; }
    .object { fill: #FFFFFF; stroke: #B8B8B8; stroke-width: 2; }
    .object-dark { fill: #FFFFFF; stroke: #2F2F2F; stroke-width: 2; }
    .object-blue { fill: #FFFFFF; stroke: #4C8BF5; stroke-width: 2; }
    .soft-fill { fill: #EDEDED; }
    .blue-fill { fill: #4C8BF5; }
    .line { fill: none; stroke: #B8B8B8; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .line-dark { fill: none; stroke: #2F2F2F; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .line-blue { fill: none; stroke: #4C8BF5; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .rule { stroke: #EDEDED; stroke-width: 2; }
    .dash { stroke-dasharray: 8 8; }
    .dot { fill: #FFFFFF; stroke: #2F2F2F; stroke-width: 2; }
    .dot-blue { fill: #FFFFFF; stroke: #4C8BF5; stroke-width: 2; }
    .command-chip { fill: #4C8BF5; fill-opacity: 0.10; stroke: #4C8BF5; stroke-opacity: 0.34; stroke-width: 2; }
  </style>
  </defs>
  <rect id="canvas" width="1200" height="900" fill="#FFFFFF" />

  <g id="figure-header">
    <text class="eyebrow" x="64" y="48">GIT SYSTEM / 12</text>
    <text class="title" x="64" y="88">Git mental model</text>
    <text class="subtitle" x="64" y="116">Git turns project state into an addressable history—and addressability makes experimentation reversible.</text>
    <line class="rule" x1="64" y1="144" x2="1136" y2="144" />
  </g>

  <!-- Conceptual dependency chain. No command syntax by design. -->
  <g id="git-philosophy">
    <path class="line-blue" d="M320 224 L320 728" />

    <g id="concept-history">
      <circle class="blue-fill" cx="320" cy="232" r="8" />
      <text class="tiny" x="112" y="238">01</text>
      <text class="title" x="280" y="242" text-anchor="end">History</text>
      <text class="section" x="376" y="232">A sequence of project states</text>
      <text class="small" x="376" y="256">Work becomes navigable when each state has identity.</text>
    </g>

    <g id="concept-branches">
      <circle class="blue-fill" cx="320" cy="328" r="8" />
      <text class="tiny" x="112" y="334">02</text>
      <text class="title" x="280" y="338" text-anchor="end">Branches</text>
      <text class="section" x="376" y="328">Movable names within that history</text>
      <text class="small" x="376" y="352">Parallel lines of work are cheap to create and cheap to rename.</text>
    </g>

    <g id="concept-snapshots">
      <circle class="blue-fill" cx="320" cy="424" r="8" />
      <text class="tiny" x="112" y="430">03</text>
      <text class="title" x="280" y="434" text-anchor="end">Snapshots</text>
      <text class="section" x="376" y="424">Complete states, not loose patches</text>
      <text class="small" x="376" y="448">Every commit describes the whole project at one moment.</text>
    </g>

    <g id="concept-references">
      <circle class="blue-fill" cx="320" cy="520" r="8" />
      <text class="tiny" x="112" y="526">04</text>
      <text class="title" x="280" y="530" text-anchor="end">References</text>
      <text class="section" x="376" y="520">Small pointers make identity practical</text>
      <text class="small" x="376" y="544">Names move; the underlying objects remain content-addressed.</text>
    </g>

    <g id="concept-recovery">
      <circle class="blue-fill" cx="320" cy="616" r="8" />
      <text class="tiny" x="112" y="622">05</text>
      <text class="title" x="280" y="626" text-anchor="end">Recovery</text>
      <text class="section" x="376" y="616">Prior pointer positions remain observable</text>
      <text class="small" x="376" y="640">A mistake is often a lost name, not lost content.</text>
    </g>

    <g id="concept-confidence">
      <circle class="dot-blue" cx="320" cy="712" r="15" />
      <text class="tiny blue-text" x="112" y="718">06</text>
      <text class="title blue-text" x="280" y="722" text-anchor="end">Confidence</text>
      <text class="section" x="376" y="712">Reversible work changes team behavior</text>
      <text class="small" x="376" y="736">People can explore, review, disagree, and repair without fear.</text>
    </g>

    <g id="philosophy-thesis">
      <line class="rule" x1="376" y1="800" x2="1088" y2="800" />
      <text class="section" x="376" y="840">When history is addressable, mistakes become navigable.</text>
    </g>
  </g>
</svg>
