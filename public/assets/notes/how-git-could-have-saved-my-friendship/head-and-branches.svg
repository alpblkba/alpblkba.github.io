<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800"
  viewBox="0 0 1200 800" role="img" aria-labelledby="svg-title svg-desc">
  <title id="svg-title">HEAD and branches</title>
  <desc id="svg-desc">Commits A through E form a history. Main, feature login, and feature auth point to commits. HEAD moves from main to feature auth.</desc>
  <metadata>How Git Could Have Saved My Friendship — figure 03</metadata>

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L8 5 L1 9" fill="none" stroke="#4C8BF5" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" />
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L8 5 L1 9" fill="none" stroke="#666666" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" />
    </marker>
    <style>
    :root { color-scheme: light; }
    * { vector-effect: non-scaling-stroke; }
    text {
      font-family: Inter, "SF Pro Text", "SF Pro Display", -apple-system,
        BlinkMacSystemFont, "Segoe UI", sans-serif;
      fill: #111111;
      text-rendering: geometricPrecision;
    }
    .mono {
      font-family: "JetBrains Mono", "IBM Plex Mono", "SFMono-Regular",
        Consolas, monospace;
    }
    .eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 1.6px; fill: #4C8BF5; }
    .title { font-size: 30px; font-weight: 650; letter-spacing: -0.6px; }
    .subtitle { font-size: 15px; font-weight: 450; fill: #666666; }
    .section { font-size: 16px; font-weight: 650; letter-spacing: -0.15px; }
    .label { font-size: 14px; font-weight: 650; }
    .body { font-size: 14px; font-weight: 450; }
    .small { font-size: 12px; font-weight: 500; fill: #666666; }
    .tiny { font-size: 11px; font-weight: 550; fill: #666666; letter-spacing: 0.2px; }
    .hash { font-size: 12px; font-weight: 550; fill: #666666; }
    .blue-text { fill: #4C8BF5; }
    .muted { fill: #B8B8B8; }
    .white-text { fill: #FFFFFF; }
    .panel { fill: #FFFFFF; stroke: #EDEDED; stroke-width: 2; }
    .object { fill: #FFFFFF; stroke: #B8B8B8; stroke-width: 2; }
    .object-dark { fill: #FFFFFF; stroke: #2F2F2F; stroke-width: 2; }
    .object-blue { fill: #FFFFFF; stroke: #4C8BF5; stroke-width: 2; }
    .soft-fill { fill: #EDEDED; }
    .blue-fill { fill: #4C8BF5; }
    .line { fill: none; stroke: #B8B8B8; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .line-dark { fill: none; stroke: #2F2F2F; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .line-blue { fill: none; stroke: #4C8BF5; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .rule { stroke: #EDEDED; stroke-width: 2; }
    .dash { stroke-dasharray: 8 8; }
    .dot { fill: #FFFFFF; stroke: #2F2F2F; stroke-width: 2; }
    .dot-blue { fill: #FFFFFF; stroke: #4C8BF5; stroke-width: 2; }
    .command-chip { fill: #4C8BF5; fill-opacity: 0.10; stroke: #4C8BF5; stroke-opacity: 0.34; stroke-width: 2; }
  </style>
  </defs>
  <rect id="canvas" width="1200" height="800" fill="#FFFFFF" />

  <g id="figure-header">
    <text class="eyebrow" x="64" y="48">GIT SYSTEM / 03</text>
    <text class="title" x="64" y="88">HEAD and branches</text>
    <text class="subtitle" x="64" y="116">Branches are movable names; HEAD identifies the branch currently receiving commits.</text>
    <line class="rule" x1="64" y1="144" x2="1136" y2="144" />
  </g>

  <!-- Branch names point to commits; HEAD points to the checked-out branch -->
  <g id="commit-history">
    <path class="line-dark" d="M151 410 L313 410 M343 410 L505 410 M535 410 L697 410 M727 410 L889 410" />
    <g ><circle class="dot" cx="136" cy="410" r="15" /><text class="label" x="136" y="415" text-anchor="middle">A</text></g>
    <g ><circle class="dot" cx="328" cy="410" r="15" /><text class="label" x="328" y="415" text-anchor="middle">B</text></g>
    <g ><circle class="dot" cx="520" cy="410" r="15" /><text class="label" x="520" y="415" text-anchor="middle">C</text></g>
    <g ><circle class="dot-blue" cx="712" cy="410" r="15" /><text class="label blue-text" x="712" y="415" text-anchor="middle">D</text></g>
    <g ><circle class="dot" cx="904" cy="410" r="15" /><text class="label" x="904" y="415" text-anchor="middle">E</text></g>
    <text class="tiny" x="136" y="452" text-anchor="middle">oldest</text>
    <text class="tiny" x="904" y="452" text-anchor="middle">newest</text>
  </g>

  <g id="branch-pointers">
    <g id="feature-login-pointer">
      <path class="line" d="M520 428 L520 514" />
      <rect class="object" x="444" y="516" width="152" height="48" rx="8" />
      <text class="mono body" x="520" y="546" text-anchor="middle">feature/login</text>
    </g>
    <g id="feature-auth-pointer">
      <rect class="object-blue" x="632" y="264" width="160" height="48" rx="8" />
      <text class="mono body blue-text" x="712" y="294" text-anchor="middle">feature/auth</text>
      <path class="line-blue" d="M712 312 L712 390" marker-end="url(#arrow-blue)" />
    </g>
    <g id="main-pointer">
      <path class="line" d="M904 428 L904 514" />
      <rect class="object" x="844" y="516" width="120" height="48" rx="8" />
      <text class="mono body" x="904" y="546" text-anchor="middle">main</text>
    </g>
  </g>

  <g id="head-pointer">
    <g id="head-before">
      <text class="tiny" x="904" y="180" text-anchor="middle">BEFORE</text>
      <rect class="object" x="844" y="192" width="120" height="48" rx="8" />
      <text class="mono label muted" x="904" y="222" text-anchor="middle">HEAD</text>
      <path class="line dash" d="M904 240 L904 506" />
    </g>
    <path class="line-blue dash" d="M836 216 C800 176 760 176 732 216" marker-end="url(#arrow-blue)" />
    <text class="mono tiny blue-text" x="784" y="170" text-anchor="middle">git switch feature/auth</text>
    <g id="head-after">
      <text class="tiny blue-text" x="712" y="180" text-anchor="middle">NOW</text>
      <rect class="blue-fill" x="652" y="192" width="120" height="48" rx="8" />
      <text class="mono label white-text" x="712" y="222" text-anchor="middle">HEAD</text>
      <path class="line-blue" d="M712 240 L712 256" marker-end="url(#arrow-blue)" />
    </g>
  </g>

  <g id="head-lesson">
    <line class="rule" x1="176" y1="648" x2="1024" y2="648" />
    <text class="section" x="600" y="688" text-anchor="middle">Switching moves HEAD between branch names. The commit graph stays put.</text>
  </g>
</svg>
