<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800"
  viewBox="0 0 1200 800" role="img" aria-labelledby="svg-title svg-desc">
  <title id="svg-title">Working tree, index, repository</title>
  <desc id="svg-desc">Files are edited in the working tree, staged into the index with git add, and recorded as a commit with git commit.</desc>
  <metadata>How Git Could Have Saved My Friendship — figure 02</metadata>

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L8 5 L1 9" fill="none" stroke="#4C8BF5" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" />
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L8 5 L1 9" fill="none" stroke="#666666" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" />
    </marker>
    <style>
    :root { color-scheme: light; }
    * { vector-effect: non-scaling-stroke; }
    text {
      font-family: Inter, "SF Pro Text", "SF Pro Display", -apple-system,
        BlinkMacSystemFont, "Segoe UI", sans-serif;
      fill: #111111;
      text-rendering: geometricPrecision;
    }
    .mono {
      font-family: "JetBrains Mono", "IBM Plex Mono", "SFMono-Regular",
        Consolas, monospace;
    }
    .eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 1.6px; fill: #4C8BF5; }
    .title { font-size: 30px; font-weight: 650; letter-spacing: -0.6px; }
    .subtitle { font-size: 15px; font-weight: 450; fill: #666666; }
    .section { font-size: 16px; font-weight: 650; letter-spacing: -0.15px; }
    .label { font-size: 14px; font-weight: 650; }
    .body { font-size: 14px; font-weight: 450; }
    .small { font-size: 12px; font-weight: 500; fill: #666666; }
    .tiny { font-size: 11px; font-weight: 550; fill: #666666; letter-spacing: 0.2px; }
    .hash { font-size: 12px; font-weight: 550; fill: #666666; }
    .blue-text { fill: #4C8BF5; }
    .muted { fill: #B8B8B8; }
    .white-text { fill: #FFFFFF; }
    .panel { fill: #FFFFFF; stroke: #EDEDED; stroke-width: 2; }
    .object { fill: #FFFFFF; stroke: #B8B8B8; stroke-width: 2; }
    .object-dark { fill: #FFFFFF; stroke: #2F2F2F; stroke-width: 2; }
    .object-blue { fill: #FFFFFF; stroke: #4C8BF5; stroke-width: 2; }
    .soft-fill { fill: #EDEDED; }
    .blue-fill { fill: #4C8BF5; }
    .line { fill: none; stroke: #B8B8B8; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .line-dark { fill: none; stroke: #2F2F2F; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .line-blue { fill: none; stroke: #4C8BF5; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .rule { stroke: #EDEDED; stroke-width: 2; }
    .dash { stroke-dasharray: 8 8; }
    .dot { fill: #FFFFFF; stroke: #2F2F2F; stroke-width: 2; }
    .dot-blue { fill: #FFFFFF; stroke: #4C8BF5; stroke-width: 2; }
    .command-chip { fill: #4C8BF5; fill-opacity: 0.10; stroke: #4C8BF5; stroke-opacity: 0.34; stroke-width: 2; }
  </style>
  </defs>
  <rect id="canvas" width="1200" height="800" fill="#FFFFFF" />

  <g id="figure-header">
    <text class="eyebrow" x="64" y="48">GIT SYSTEM / 02</text>
    <text class="title" x="64" y="88">Working tree, index, repository</text>
    <text class="subtitle" x="64" y="116">Three views of the same paths, each holding a different snapshot of your work.</text>
    <line class="rule" x1="64" y1="144" x2="1136" y2="144" />
  </g>

  <!-- State pipeline: edit → git add → git commit -->
  <g id="three-state-pipeline">
    <g id="working-tree-panel">
      <rect class="panel" x="64" y="208" width="304" height="448" rx="8" />
      <text class="section" x="88" y="248">Working Tree</text>
      <text class="mono tiny blue-text" x="344" y="248" text-anchor="end">edit</text>
      <line class="rule" x1="88" y1="272" x2="344" y2="272" />

      <g id="working-file-app">
        <rect class="object-blue" x="88" y="304" width="256" height="56" rx="8" />
        <text class="mono body" x="104" y="338">app.ts</text>
        <text class="tiny blue-text" x="328" y="338" text-anchor="end">modified</text>
      </g>
      <g id="working-file-auth">
        <rect class="object-blue" x="88" y="376" width="256" height="56" rx="8" />
        <text class="mono body" x="104" y="410">auth.ts</text>
        <text class="tiny blue-text" x="328" y="410" text-anchor="end">modified</text>
      </g>
      <g id="working-file-readme">
        <rect class="object" x="88" y="448" width="256" height="56" rx="8" />
        <text class="mono body" x="104" y="482">README.md</text>
        <text class="tiny" x="328" y="482" text-anchor="end">unchanged</text>
      </g>
      <text class="tiny" x="88" y="552">MUTABLE FILES</text>
      <text class="body" x="88" y="580">What is on disk right now</text>
      <path class="line-blue" d="M320 256 L320 294" marker-end="url(#arrow-blue)" />
    </g>

    <g id="index-panel">
      <rect class="panel" x="448" y="208" width="304" height="448" rx="8" />
      <text class="section" x="472" y="248">Index</text>
      <text class="small" x="728" y="248" text-anchor="end">Staging Area</text>
      <line class="rule" x1="472" y1="272" x2="728" y2="272" />

      <g id="staged-file-app">
        <rect class="object-blue" x="472" y="304" width="256" height="56" rx="8" />
        <text class="mono body" x="488" y="338">app.ts</text>
        <text class="tiny blue-text" x="712" y="338" text-anchor="end">staged</text>
      </g>
      <g id="staged-file-auth">
        <rect class="object-blue" x="472" y="376" width="256" height="56" rx="8" />
        <text class="mono body" x="488" y="410">auth.ts</text>
        <text class="tiny blue-text" x="712" y="410" text-anchor="end">staged</text>
      </g>
      <g id="indexed-file-readme">
        <rect class="object" x="472" y="448" width="256" height="56" rx="8" />
        <text class="mono body" x="488" y="482">README.md</text>
        <text class="tiny" x="712" y="482" text-anchor="end">from HEAD</text>
      </g>
      <text class="tiny" x="472" y="552">PROPOSED SNAPSHOT</text>
      <text class="body" x="472" y="580">Exactly what the next commit records</text>
    </g>

    <g id="repository-panel">
      <rect class="panel" x="832" y="208" width="304" height="448" rx="8" />
      <text class="section" x="856" y="248">Repository</text>
      <text class="small" x="1112" y="248" text-anchor="end">Object database</text>
      <line class="rule" x1="856" y1="272" x2="1112" y2="272" />

      <g id="new-commit-snapshot">
        <rect class="object-blue" x="856" y="304" width="256" height="200" rx="8" />
        <rect class="blue-fill" x="856" y="304" width="6" height="200" rx="3" />
        <text class="tiny" x="880" y="334">COMMIT</text>
        <text class="mono hash blue-text" x="1088" y="334" text-anchor="end">4e8c9d2</text>
        <line class="rule" x1="880" y1="352" x2="1088" y2="352" />
        <text class="mono body" x="880" y="384">app.ts</text>
        <text class="tiny" x="1088" y="384" text-anchor="end">snapshot</text>
        <text class="mono body" x="880" y="424">auth.ts</text>
        <text class="tiny" x="1088" y="424" text-anchor="end">snapshot</text>
        <text class="mono body" x="880" y="464">README.md</text>
        <text class="tiny" x="1088" y="464" text-anchor="end">snapshot</text>
      </g>
      <text class="tiny" x="856" y="552">IMMUTABLE SNAPSHOT</text>
      <text class="body" x="856" y="580">Stored under a new commit identity</text>
    </g>

    <g id="git-add-transition">
      <text class="mono tiny blue-text" x="408" y="390" text-anchor="middle">git add</text>
      <path class="line-blue" d="M376 408 L440 408" marker-end="url(#arrow-blue)" />
    </g>
    <g id="git-commit-transition">
      <text class="mono tiny blue-text" x="792" y="390" text-anchor="middle">git commit</text>
      <path class="line-blue" d="M760 408 L824 408" marker-end="url(#arrow-blue)" />
    </g>

    <g id="state-lesson">
      <line class="rule" x1="168" y1="704" x2="1032" y2="704" />
      <text class="body" x="600" y="736" text-anchor="middle">One pathname can have three simultaneously valid versions.</text>
    </g>
  </g>
</svg>
